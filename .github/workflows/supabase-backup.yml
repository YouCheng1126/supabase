name: Supabase Database Backup

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日凌晨執行
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出儲存庫
        uses: actions/checkout@v4

      - name: 執行資料庫備份 (使用 Postgres 17 容器)
        run: |
          mkdir -p backups
          DATE=$(date +'%Y-%m-%d')
          
          # 使用 docker 呼叫 postgres:17 版本的 pg_dump 來執行備份
          docker run --rm postgres:latest pg_dump "${{ secrets.SUPABASE_DB_URL }}" -c -O > backups/db-backup-$DATE.sql

      - name: 清理舊備份並提交 (僅保留 30 天內)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          find backups/ -name "*.sql" -type f -mtime +30 -exec rm {} \;
          
          git add backups/*
          git commit -m "chore: 🗄️ automated database backup and cleanup" || echo "No changes to commit"
          git push
